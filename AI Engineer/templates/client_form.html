{% extends "base.html" %}
{% block title %}{% if client %}Edit{% else %}New{% endif %} client · AW Portal{% endblock %}
{% block content %}
<h1 class="mb-2 text-2xl font-bold text-slate-900">{% if client %}Edit profile{% else %}New client{% endif %}</h1>
<p class="mb-6 text-slate-600">Static household information (updated rarely).</p>

<form method="post" class="space-y-8 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="grid gap-6 sm:grid-cols-2">
    <div class="sm:col-span-2">
      <label class="flex items-center gap-2 text-sm font-medium text-slate-700">
        <input type="checkbox" name="is_married" value="1" class="rounded border-slate-300 text-brand"
               {% if not client or client.is_married %}checked{% endif %} />
        Married / two clients on report
      </label>
    </div>

    <div class="rounded-lg border border-slate-100 bg-slate-50/80 p-4">
      <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-brand">Client 1</h2>
      <div class="grid gap-3 sm:grid-cols-2">
        <div>
          <label class="block text-xs font-medium text-slate-600">First name</label>
          <input name="c1_first_name" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
                 value="{{ client.c1_first_name if client else '' }}" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600">Last name</label>
          <input name="c1_last_name" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
                 value="{{ client.c1_last_name if client else '' }}" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600">Date of birth</label>
          <input type="date" name="c1_dob" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
                 value="{{ client.c1_dob.isoformat() if client and client.c1_dob else '' }}" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600">SSN last 4</label>
          <input name="c1_ssn_last4" maxlength="4" pattern="[0-9]{0,4}" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
                 value="{{ client.c1_ssn_last4 if client else '' }}" />
        </div>
      </div>
    </div>

    <div class="rounded-lg border border-slate-100 bg-slate-50/80 p-4" id="client2-block">
      <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-brand">Client 2</h2>
      <div class="grid gap-3 sm:grid-cols-2">
        <div>
          <label class="block text-xs font-medium text-slate-600">First name</label>
          <input name="c2_first_name" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
                 value="{{ client.c2_first_name if client else '' }}" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600">Last name</label>
          <input name="c2_last_name" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
                 value="{{ client.c2_last_name if client else '' }}" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600">Date of birth</label>
          <input type="date" name="c2_dob" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
                 value="{{ client.c2_dob.isoformat() if client and client.c2_dob else '' }}" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600">SSN last 4</label>
          <input name="c2_ssn_last4" maxlength="4" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
                 value="{{ client.c2_ssn_last4 if client else '' }}" />
        </div>
      </div>
    </div>

    <div class="sm:col-span-2">
      <label class="block text-sm font-medium text-slate-700">Trust property address</label>
      <input name="trust_property_address" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
             value="{{ client.trust_property_address if client else '' }}" placeholder="Street, city, state" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700">Monthly salary (after tax)</label>
      <input type="number" step="0.01" name="monthly_salary_after_tax" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
             value="{{ client.monthly_salary_after_tax if client else '' }}" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700">Agreed monthly expense budget</label>
      <input type="number" step="0.01" name="agreed_monthly_expense_budget" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
             value="{{ client.agreed_monthly_expense_budget if client else '' }}" />
    </div>
  </div>

  <div class="flex gap-3">
    <button type="submit" class="rounded-lg bg-brand px-5 py-2.5 text-sm font-semibold text-white hover:bg-brand-dark">Save profile</button>
    <a href="{{ url_for('clients_list') }}" class="rounded-lg border border-slate-300 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</a>
  </div>
</form>

<script>
  document.querySelector('input[name="is_married"]')?.addEventListener('change', (e) => {
    document.getElementById('client2-block').classList.toggle('opacity-50', !e.target.checked);
    document.getElementById('client2-block').querySelectorAll('input').forEach((i) => { i.disabled = !e.target.checked; });
  });
</script>
{% endblock %}
