<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AW Client Report Portal{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { DEFAULT: '#3b82f6', dark: '#2563eb' } }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <header class="border-b border-slate-200 bg-white shadow-sm">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
      <a href="{{ url_for('clients_list') }}" class="text-xl font-semibold text-brand">AW Client Report Portal</a>
      <nav class="flex gap-4 text-sm font-medium text-slate-600">
        <a href="{{ url_for('clients_list') }}" class="hover:text-brand">Clients</a>
        <a href="{{ url_for('client_new') }}" class="hover:text-brand">New client</a>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-5xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
