<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberdyne Systems - Contact Sales</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            color: #111;
            font-size: 24px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #4A90E2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #111;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #333;
        }

        #status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            text-align: center;
        }

        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .error {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Contact Enterprise Sales</h2>
        <p>Fill out the form below. Our SDR team will review your requirements and reach out.</p>

        <form id="leadForm">
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>First Name</label>
                    <input type="text" id="firstName" value="Sarah" required>
                </div>
                <div style="flex: 1;">
                    <label>Last Name</label>
                    <input type="text" id="lastName" value="Connor" required>
                </div>
            </div>

            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Work Email</label>
                    <input type="email" id="email" value="sarah.connor@cyberdyne.com" required>
                </div>
                <div style="flex: 1;">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" value="555-0198" required>
                </div>
            </div>

            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Company Name</label>
                    <input type="text" id="companyName" value="Cyberdyne Systems" required>
                </div>
                <div style="flex: 1;">
                    <label>Website Domain</label>
                    <input type="url" id="website" value="cyberdyne.com" required>
                </div>
            </div>

            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Industry</label>
                    <select id="industry" required>
                        <option value="Software">Software & Technology</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Manufacturing" selected>Manufacturing</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Company Size</label>
                    <select id="companySize" required>
                        <option value="1-50">1-50 Employees</option>
                        <option value="51-200">51-200 Employees</option>
                        <option value="201-1000">201-1,000 Employees</option>
                        <option value="1000+" selected>1,000+ Employees</option>
                    </select>
                </div>
            </div>

            <label>Job Title</label>
            <input type="text" id="jobTitle" value="Director of Technology" required>

            <label>How can we help? (Be specific)</label>
            <textarea id="inquiry" rows="4"
                required>We are struggling with manual data entry for our robotics division. Do you have any experience automating healthcare or manufacturing robotics workflows?</textarea>

            <!-- REPLACE THIS VALUE WITH YOUR N8N WEBHOOK TEST URL -->
            <input type="hidden" id="webhookUrl"
                value="https://muricate-geoffrey-not.ngrok-free.dev/webhook-test/6ff52f82-a38c-47d0-9073-14ea9bbff77c">
            
            <input type="hidden" id="leadSource" value="Inbound Landing Page">

            <button type="submit">Submit Inquiry</button>
            <div id="status"></div>
        </form>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const statusDiv = document.getElementById('status');
            const submitBtn = document.querySelector('button');
            const webhookUrl = document.getElementById('webhookUrl').value;

            if (webhookUrl === "YOUR_N8N_WEBHOOK_URL_HERE") {
                statusDiv.textContent = "Error: Please update the hidden webhookUrl field in the HTML code with your actual n8n test URL.";
                statusDiv.className = "error";
                statusDiv.style.display = "block";
                return;
            }

            submitBtn.textContent = "Sending...";
            submitBtn.disabled = true;

            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                companyName: document.getElementById('companyName').value,
                website: document.getElementById('website').value,
                industry: document.getElementById('industry').value,
                companySize: document.getElementById('companySize').value,
                jobTitle: document.getElementById('jobTitle').value,
                leadSource: document.getElementById('leadSource').value,
                inquiry: document.getElementById('inquiry').value
            };

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusDiv.textContent = "Success! Your inquiry has been routed to our team.";
                    statusDiv.className = "success";
                    statusDiv.style.display = "block";
                } else {
                    throw new Error('Network response was not ok.');
                }
            } catch (error) {
                statusDiv.textContent = "Failed to send data. Is your n8n workflow listening for a test event?";
                statusDiv.className = "error";
                statusDiv.style.display = "block";
            } finally {
                submitBtn.textContent = "Submit Inquiry";
                submitBtn.disabled = false;
            }
        });
    </script>

</body>

</html>
